name: zizmor

on:
  push:
  pull_request:

permissions:
      actions: read # An explanation.

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}

    permissions:
      security-events: write # An explanation.
      actions: read # An explanation.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v4
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # pin@v5

      - name: Run zizmor 🌈
        run: |
          cd "$GITHUB_WORKSPACE"
          uvx zizmor --pedantic --gh-token "$GH_TOKEN" .github/workflows/*

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
